services:
  postgres:
    image: postgres:16-alpine
    container_name: clinicalvoice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinicalvoice
      POSTGRES_PASSWORD: clinicalvoice
      POSTGRES_DB: clinicalvoice
    ports:
      - "5432:5432"
    volumes:
      - clinicalvoice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinicalvoice"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clinicalvoice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clinicalvoice_pgdata:
